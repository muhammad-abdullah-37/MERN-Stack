<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel='stylesheet' href ='styles.css'/> 
</head>

<body>
    <ul class = 'todo-list'>

        
        <li> <input id='task-1' type='checkbox' />
        <label for='task-1'>Learn HTML</label>
        <ul class='sub-item'>
            <li><a class='sub-item-link' target='_blank' href='https://www.google.com'>View Details</a></li>
        </ul>
        </li>
        


        
        <li>
            <input id='task-2' type='checkbox' />

            <ul class='sub-item'>
                <li><a class='sub-item-link' target='_blank' href='https://developer.mozilla.org'> Read More</a></li>
            </ul>
            
        </li>


        <li>
            <input id='task-3' type='checkbox' />

            <ul class='sub-item'>
                <li><a class='sub-item-link' target='_blank' href='https://www.github.com'> Open Resource</a></li>
            </ul>
             
        </li>


        <li>
            <input id='task-4' type='checkbox' />
            <label for='task-4'>Push to GitHub</label>
            <ul class='sub-item'>
                <li><a class='sub-item-link' target="_blank" href='https://www.w3schools.com'>Learn More</a></li>
            </ul>
            
        </li>


    </ul>
</body>

</html>
