<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Watch Landing Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header id="header">

    <img
      id="header-img"
      src="https://cdn-icons-png.flaticon.com/512/2920/2920244.png"
      alt="Smart Watch Logo"
    >

    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#video-section">Video</a>
      <a class="nav-link" href="#contact">Contact</a>
    </nav>

  </header>

  <!-- Features -->
  <section id="features">
    <h2>Smart Watch Features</h2>

    <p>✔️ Heart Rate Monitoring</p>
    <p>✔️ Sleep Tracking</p>
    <p>✔️ GPS Navigation</p>
    <p>✔️ Waterproof Design</p>
  </section>

  <!-- Video -->
  <section id="video-section">

    <h2>Watch Introduction</h2>

    <iframe
      id="video"
      width="700"
      height="400"
      src="https://www.youtube.com/embed/2Vv-BfVoq4g"
      title="Smart Watch Video"
      allowfullscreen>
    </iframe>

  </section>

  <!-- Contact -->
  <section id="contact">

    <h2>Subscribe for Updates</h2>

    <form
      id="form"
      action="https://www.freecodecamp.org/email-submit"
    >

      <input
        id="email"
        name="email"
        type="email"
        placeholder="Enter your email address"
        required
      >

      <input
        id="submit"
        type="submit"
        value="Subscribe"
      >

    </form>

  </section>

</body>
</html>
