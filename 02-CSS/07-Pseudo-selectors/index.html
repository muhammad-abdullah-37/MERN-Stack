<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel='stylesheet' href='styles.css' />
</head>
<body>
    <div class='container'>
        <form>
            <input type='text' id='name'/>
            <label for='name'>Full Name: </label>


            <input type='email' id='email'/>
            <label for='email' >Email:</label>

            <select id='position'>
                <option value='' > Select a Position </option>
                <option value ='frontend'>Frontend Developer</option>
                <option value ='backend'>Backend Developer</option>
                <option value ='fullstack'>Full Stack Developer</option>
                <option value ='uiux'>UI/UX Designer</option>
                <option value ='qa'>QA Engineer</option>
            </select>

            <fieldset class='radio-group'>
            <input type='radio' name='availability' id='immediately'/>
            <label for ='immediately' > Immediately Available </label>

            <input type='radio' name='availability' id='2-weeks'/>
            <label for ='2-weeks' > Available Within 2 Weeks</label>


            <input type='radio' name='availability' id='1-month'/>
            <label for ='1-month' > Available Within 1 Month</label>


            
            <input type='radio' name='availability' id='not-available'/>
            <label for ='not-available' > Not Currently Available</label>
            

            </fieldset>

            <textarea id='message'> </textarea>
            <button type='submit'>Submit Form </button>
        </form>
    </div>
</body>
</html>
