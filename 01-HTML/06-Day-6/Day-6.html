<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Audio and Video Lab</title>
</head>
<body>
  <h1>Immerse Yourself in Audio & Video Excellence</h1>
  <section>
    <h2>Watch Our Latest Adventure</h2>
    <video controls width = "640" > 
      <source
      src = "https://www.w3schools.com/html/mov_bbb.mp4"
      type = "video/mp4"
      > 
      </source>
    </video>
  </section>


  <section>
    <h2>Listen to Our Travel Soundtrack</h2>
    <audio controls loop src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"> </audio>
  </section>
</body>
</html>
