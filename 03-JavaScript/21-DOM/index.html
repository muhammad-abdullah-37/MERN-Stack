<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="story-container">
        <h1>Choose a Story</h1>

        <div class="buttons">
            <button id="scary-btn">Scary Story</button>
            <button id="funny-btn">Funny Story</button>
            <button id="adventure-btn">Adventure Story</button>
        </div>

        <p id="result">
            Click a button to display a story.
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
